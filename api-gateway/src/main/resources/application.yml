server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: usuario-service
          uri: lb://usuario-service
          predicates:
            - Path=/api/usuarios/**, /api/clientes/**
          filters:
            - name: CircuitBreaker
              args:
                name: usuarioService
                fallbackUri: forward:/fallback/usuarios

        - id: producto-service
          uri: lb://producto-service
          predicates:
            - Path=/api/categorias/**, /api/productos/**, /api/proveedores/**
          filters:
            - name: CircuitBreaker
              args:
                name: productoService
                fallbackUri: forward:/fallback/productos

        - id: ventas-service
          uri: lb://ventas-service
          predicates:
            - Path=/api/tickets/**, /api/detalle-ticket/**
          filters:
            - name: CircuitBreaker
              args:
                name: ventasService
                fallbackUri: forward:/fallback/ventas

        - id: compras-service
          uri: lb://compras-service
          predicates:
            - Path=/api/compras/**, /api/detalle-compra/**
          filters:
            - name: CircuitBreaker
              args:
                name: comprasService
                fallbackUri: forward:/fallback/compras

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway