server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: usuario-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/usuarios/**, /api/clientes/**
        - id: producto-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/categorias/**, /api/productos/**, /api/proveedores/**
        - id: ventas-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/tickets/**, /api/detalle-ticket/**
        - id: compras-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/compras/**, /api/detalle-compra/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always